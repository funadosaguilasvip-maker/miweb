<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fundados Águilas</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

</head>

<body class="bg-black text-white">

<!-- HEADER -->
<div class="sticky top-0 bg-black border-b border-gray-800 p-4 text-center">
  <h1 class="font-bold text-lg">🦅 Fundados Águilas</h1>
</div>

<!-- PUBLICAR -->
<div class="max-w-xl mx-auto p-4 border-b border-gray-800">
  <textarea id="mensaje" class="w-full bg-black border border-gray-700 rounded-xl p-3" placeholder="¿Qué quieres publicar?"></textarea>
  <button onclick="enviarPost()" class="w-full mt-2 bg-pink-600 p-2 rounded-xl">Publicar</button>
</div>

<!-- BOTONES -->
<div class="max-w-xl mx-auto p-2 text-center">
  <button onclick="modoViral()" class="bg-yellow-500 text-black px-4 py-1 rounded">🔥 Virales</button>
  <button onclick="modoReciente()" class="bg-gray-700 px-4 py-1 rounded ml-2">🕒 Recientes</button>
</div>

<!-- FEED -->
<div id="lista" class="max-w-xl mx-auto"></div>

<script>
// 🔑 CONEXIÓN SUPABASE (REEMPLAZAR)
const supabase = window.supabase.createClient(
  "https://rdxzfgegfjbavgobhqdk.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJkeHpmZ2VnZmpiYXZnb2JocWRrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyMjA2NDAsImV4cCI6MjA4OTc5NjY0MH0.bcYoHAtVs2CfWWutjvCfClnX9QvEJ7QF-lZL2XLGGOY"
);

let modo = "reciente";

// 📤 PUBLICAR
async function enviarPost() {
  const mensaje = document.getElementById("mensaje").value.trim();
  if (mensaje.length < 5) return;

  await supabase.from("quejas").insert([
    { texto: mensaje, fecha: new Date(), likes: 0 }
  ]);

  document.getElementById("mensaje").value = "";
  cargarPosts();
}

// ❤️ LIKE
async function likePost(id, likes) {
  await supabase.from("quejas")
    .update({ likes: likes + 1 })
    .eq("id", id);

  cargarPosts();
}

// 💬 COMENTAR
async function comentar(id) {
  const input = document.getElementById("c-"+id);
  const texto = input.value.trim();
  if (!texto) return;

  await supabase.from("comentarios").insert([
    { post_id: id, texto: texto }
  ]);

  input.value = "";
  cargarPosts();
}

// 🔄 CAMBIAR MODO
function modoViral() {
  modo = "viral";
  cargarPosts();
}

function modoReciente() {
  modo = "reciente";
  cargarPosts();
}

// 📥 CARGAR POSTS
async function cargarPosts() {

  let query = supabase.from("quejas").select("*");

  if (modo === "viral") {
    query = query.order("likes", { ascending: false });
  } else {
    query = query.order("fecha", { ascending: false });
  }

  const { data: posts } = await query;

  const { data: comentarios } = await supabase
    .from("comentarios")
    .select("*");

  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  posts.forEach(p => {

    const comentariosPost = comentarios.filter(c => c.post_id == p.id);

    const div = document.createElement("div");
    div.className = "border-b border-gray-800 p-4";

    div.innerHTML = `
      <div class="flex items-center mb-2">
        <div class="w-8 h-8 bg-gray-700 rounded-full"></div>
        <span class="ml-2 font-semibold">Anónimo</span>
      </div>

      <p class="mb-2">${p.texto}</p>

      <div class="flex justify-between text-gray-400 text-sm mb-2">
        <span>${new Date(p.fecha).toLocaleString()}</span>
        <button onclick="likePost('${p.id}', ${p.likes || 0})">❤️ ${p.likes || 0}</button>
      </div>

      <div class="text-sm text-gray-300">
        ${comentariosPost.map(c => `<p>💬 ${c.texto}</p>`).join("")}
      </div>

      <div class="flex mt-2">
        <input id="c-${p.id}" placeholder="Comentar..." class="flex-1 bg-black border border-gray-700 p-1 text-sm">
        <button onclick="comentar('${p.id}')" class="ml-2 text-blue-400">Enviar</button>
      </div>
    `;

    lista.appendChild(div);
  });
}

// 🔄 ACTUALIZA AUTOMÁTICO
setInterval(cargarPosts, 2000);
cargarPosts();

</script>

</body>
</html>
